{% extends 'base_publico.html' %}

{% block conteudo %}
<div class="hero bg-base-200 min-h-screen ">
    <div class="hero-content max-w-5xl flex-col gap-10 lg:flex-row-reverse">
        <div class="text-center lg:text-left">
            <h1 class="text-5xl font-bold">Faça login!</h1>
            <p class="py-6">
                        Já possui uma conta e deseja retornar? Faça login para voltar a ter acesso aos nossos conteúdos e aproveitar as funcionalidades novamente!
            </p>
        </div>

        <div class="flex card bg-base-100 w-full max-w-[480px] h-[300px] shrink-0 shadow-2xl">
            <div class="justify-center card-body card-body flex flex-col items-center">
                <fieldset class="fieldset w-full max-w-sm">
                    <form action="/login" method="POST" class="flex flex-col gap-4">
                        <div class="flex flex-col gap-2">
                            <label class="label">Email</label>
                            <input required type="email" name="email" class="input w-full" placeholder="Digite seu email">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="label">Senha</label>
                            <input required type="password" name="senha" class="input w-full" placeholder="Digite sua senha">
                        </div>
                        <button type="submit" class="btn btn-primary mt-4">
                            Login
                        </button>
                    </form>
                </fieldset>
            </div>
        </div>
    </div>
</div>
{% endblock %}
